name = "mersal-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
minify = true

[[d1_databases]]
binding = "DB"
database_name = "mersal-db"
database_id = "46481087-8bd4-4726-91cd-02c7dfb46d44"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "mersal-uploads"

[[vectorize]]
binding = "VECTORIZE"
index_name = "mersal-vectors"

[ai]
binding = "AI"
